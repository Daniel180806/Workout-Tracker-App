<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Exercises</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-searchbar placeholder="Search exercises..." [(ngModel)]="searchTerm" (ionInput)="onSearch()"></ion-searchbar>
  @for(x of filteredExercises; track x){
    <ion-card (click)="onExerciseClick(x)">
      <ion-card-header>
        <ion-card-title>{{ x.name }}</ion-card-title>
      </ion-card-header>
    </ion-card>
  }

</ion-content>
